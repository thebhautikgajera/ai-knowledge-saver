<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AI Knowledge Saver</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <h1 class="title">AI Knowledge Saver</h1>

      <p id="token-status" class="token-status"></p>

      <label for="token" class="label">Access Token</label>
      <input
        type="password"
        id="token"
        class="input"
        placeholder="Paste your access token"
        autocomplete="off"
      />

      <div class="button-row">
        <button id="save-token" class="btn secondary">Save Token</button>
        <button id="save-page" class="btn primary">Save Current Page</button>
      </div>

      <div class="button-row">
        <button id="open-dashboard" class="btn secondary">
          Open Dashboard
        </button>
      </div>

      <p id="status" class="status"></p>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
