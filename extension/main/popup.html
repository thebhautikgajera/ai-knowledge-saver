<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AI Knowledge Saver</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <h1 class="title">AI Knowledge Saver</h1>

      <p class="helper-text">
        First connect this extension with your AI Knowledge Saver account, then
        save pages in one click.
      </p>

      <div class="button-row">
        <button id="connect-extension" class="btn secondary">
          Connect Extension with Website
        </button>
      </div>

      <div class="button-row">
        <button id="save-page" class="btn primary">Save Current Page</button>
      </div>

      <p id="status" class="status"></p>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
